<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>roebi — Robert Halter</title>
  <meta name="description" content="roebi (Robert Halter) — Swiss Open Source Developer. New Work with Skills · AI-augmented Engineering · Test Automation." />
  <meta name="author" content="roebi, Robert Halter" />
  <meta name="keywords" content="roebi, Robert Halter, open source, agent skills, new work with skills, agentskills.io, test automation, Switzerland, Python, AI tooling" />

  <!-- Open Graph -->
  <meta property="og:title" content="roebi — Robert Halter" />
  <meta property="og:description" content="Swiss Open Source Developer. New Work with Skills · AI-augmented Engineering." />
  <meta property="og:url" content="https://roebi.github.io" />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d1117; }
    #root { height: 100%; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const LINKS = [
      {
        label: "new-work-skills.dev",
        href: "https://new-work-skills.dev",
        desc: "The methodology & skill cards",
        icon: "🌐",
      },
      {
        label: "Blog",
        href: "https://roebi.github.io/roebi-halter-in-blog",
        desc: "What I'm learning & building",
        icon: "📝",
      },
      {
        label: "GitHub",
        href: "https://github.com/roebi",
        desc: "Open source skills & projects",
        icon: "⚙️",
      },
    ];

    const TAGLINE = "New Work with Skills · Swiss Open Source · AI-augmented Engineering";

    function TypingText({ text, speed = 40, delay = 0 }) {
      const [displayed, setDisplayed] = useState("");
      const [started, setStarted] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setStarted(true), delay);
        return () => clearTimeout(t);
      }, [delay]);

      useEffect(() => {
        if (!started || displayed.length >= text.length) return;
        const t = setTimeout(
          () => setDisplayed(text.slice(0, displayed.length + 1)),
          speed
        );
        return () => clearTimeout(t);
      }, [started, displayed, text, speed]);

      return (
        <span>
          {displayed}
          {displayed.length < text.length && (
            <span style={{
              borderRight: "2px solid #c9a84c",
              animation: "blink 1s step-end infinite",
              marginLeft: "1px",
            }}>&nbsp;</span>
          )}
        </span>
      );
    }

    function LinkCard({ href, label, desc, icon, delay }) {
      const [visible, setVisible] = useState(false);
      const [hovered, setHovered] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setVisible(true), delay);
        return () => clearTimeout(t);
      }, [delay]);

      return (
        <a
          href={href}
          target="_blank"
          rel="noopener noreferrer"
          onMouseEnter={() => setHovered(true)}
          onMouseLeave={() => setHovered(false)}
          style={{
            display: "flex",
            alignItems: "center",
            gap: "16px",
            padding: "14px 20px",
            background: hovered ? "rgba(201,168,76,0.08)" : "rgba(78,205,196,0.05)",
            border: `1px solid ${hovered ? "rgba(201,168,76,0.5)" : "rgba(78,205,196,0.2)"}`,
            borderRadius: "8px",
            textDecoration: "none",
            transition: "all 0.25s ease",
            opacity: visible ? 1 : 0,
            transform: visible
              ? hovered ? "translateX(4px)" : "translateY(0)"
              : "translateY(12px)",
            cursor: "pointer",
          }}
        >
          <span style={{ fontSize: "22px", minWidth: "28px", textAlign: "center" }}>
            {icon}
          </span>
          <div>
            <div style={{
              color: "#c9a84c",
              fontFamily: "'JetBrains Mono', monospace",
              fontWeight: 700,
              fontSize: "14px",
            }}>
              {label}
            </div>
            <div style={{ color: "#8b9ab0", fontSize: "12px", marginTop: "2px" }}>
              {desc}
            </div>
          </div>
          <span style={{ marginLeft: "auto", color: "#4ecdc4", opacity: 0.6, fontSize: "16px" }}>
            →
          </span>
        </a>
      );
    }

    function App() {
      const [showTagline, setShowTagline] = useState(false);
      const [showMethod, setShowMethod]   = useState(false);
      const [showLinks, setShowLinks]     = useState(false);

      useEffect(() => {
        setTimeout(() => setShowTagline(true), 700);
        setTimeout(() => setShowMethod(true),  2200);
        setTimeout(() => setShowLinks(true),   2800);
      }, []);

      return (
        <div style={{
          minHeight: "100vh",
          background: "#0d1117",
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          padding: "32px 16px",
          fontFamily: "system-ui, sans-serif",
        }}>
          <div style={{ maxWidth: "540px", width: "100%" }}>

            {/* Prompt + name */}
            <div style={{ display: "flex", alignItems: "baseline", gap: "10px", marginBottom: "4px" }}>
              <span style={{ color: "#4ecdc4", fontFamily: "'JetBrains Mono', monospace", fontSize: "22px" }}>
                ❯
              </span>
              <span style={{
                color: "#c9a84c",
                fontFamily: "'JetBrains Mono', monospace",
                fontWeight: 700,
                fontSize: "clamp(30px, 8vw, 48px)",
                letterSpacing: "-1px",
                lineHeight: 1,
              }}>
                <TypingText text="roebi" speed={110} delay={150} />
              </span>
            </div>

            {/* Tagline */}
            <div style={{
              marginLeft: "36px",
              marginBottom: "28px",
              color: "#4ecdc4",
              fontFamily: "'JetBrains Mono', monospace",
              fontSize: "12px",
              letterSpacing: "0.4px",
              minHeight: "18px",
              opacity: showTagline ? 1 : 0,
              transition: "opacity 0.5s",
            }}>
              {showTagline && <TypingText text={TAGLINE} speed={20} delay={0} />}
            </div>

            {/* Method block */}
            <div style={{
              marginBottom: "24px",
              padding: "14px 18px",
              borderLeft: "3px solid #c9a84c",
              background: "rgba(201,168,76,0.04)",
              borderRadius: "0 6px 6px 0",
              opacity: showMethod ? 1 : 0,
              transform: showMethod ? "translateY(0)" : "translateY(8px)",
              transition: "all 0.5s ease",
            }}>
              <div style={{ color: "#e6edf3", fontSize: "14px", lineHeight: 1.65 }}>
                I combine years of engineering experience with the{" "}
                <strong style={{ color: "#c9a84c" }}>New Work way</strong>{" "}
                — AI agent skills that are versioned, portable, and actually ship.
              </div>
              <div style={{ marginTop: "8px" }}>
                <a
                  href="https://agentskills.io"
                  target="_blank"
                  rel="noopener noreferrer"
                  style={{
                    color: "#4ecdc4",
                    fontSize: "11px",
                    fontFamily: "'JetBrains Mono', monospace",
                    textDecoration: "none",
                  }}
                >
                  agentskills.io specification ↗
                </a>
              </div>
            </div>

            {/* Link cards */}
            <div style={{
              display: "flex",
              flexDirection: "column",
              gap: "8px",
              opacity: showLinks ? 1 : 0,
              transition: "opacity 0.4s",
            }}>
              {LINKS.map((link, i) => (
                <LinkCard key={link.href} {...link} delay={i * 160} />
              ))}
            </div>

            {/* Footer */}
            <div style={{
              marginTop: "24px",
              textAlign: "center",
              color: "#3d4f66",
              fontSize: "11px",
              fontFamily: "'JetBrains Mono', monospace",
              opacity: showLinks ? 1 : 0,
              transition: "opacity 0.5s ease 0.5s",
            }}>
              🇨🇭 Robert Halter · roebi · Switzerland
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
